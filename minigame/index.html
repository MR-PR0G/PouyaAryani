<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Runner — Mini Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>

  <div id="hud">
    <div class="hud-group">
      <div class="hud-item">
        <span class="hud-label">LIVES</span>
        <div id="livesContainer" class="lives-container"></div>
      </div>
      <div class="hud-item">
        <span class="hud-label">SCORE</span>
        <div class="score-box">
          <div class="hud-coin">
            <img src="../logo.png" alt="Coin">
          </div>
          <span id="scoreVal">0</span>
        </div>
      </div>
    </div>

    <div class="hud-item">
      <span class="hud-label">HIGH SCORE</span>
      <span id="highScoreVal">0</span>
    </div>
  </div>

  <div id="gameOverScreen" class="overlay-screen">
    <h1 class="danger">GAME OVER</h1>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
